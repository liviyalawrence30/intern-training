version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: custom_websites_postgres

    restart: always

    environment:
      POSTGRES_DB: custom_websites_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: custom_websites_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@customwebsites.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data: