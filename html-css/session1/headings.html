<!--
Heading hierarchy improves accessibility by helping screen readers understand the structure of the page.
It also helps the Search engines to understand the page content.
-->
<h1>My Portfolio</h1>
<h2>About Me</h2>
<h2>Skills</h2>
<h3>JavaScript</h3>
<h2>Contact</h2>

<!--
'<h1>' should be directly followed by'<h2>' tag.
It should follow the logical hierarchy and shouldn't skip levels.
-->
